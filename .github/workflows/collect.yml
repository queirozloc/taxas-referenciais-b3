name: Collect B3 Rates

on:
  schedule:
    - cron: "0 8 * * 1-5"   # 08:00 UTC = 05:00 BRT, Monday–Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline
        run: |
          echo "TODAY=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          python main.py --store

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: B3 rates ${{ env.TODAY }}"
          file_pattern: "data/*.parquet"
